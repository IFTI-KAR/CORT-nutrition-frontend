[build]
  command = "npm install --prefix server && npm install --prefix client && npm run build --prefix client"
  publish = "client/dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 5173
  targetPort = 5173

# API proxy to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA redirect — all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
